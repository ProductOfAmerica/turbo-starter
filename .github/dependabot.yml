version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    groups:
      react-ecosystem:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      next-ecosystem:
        patterns: ["next", "@next/*"]
      development:
        patterns: ["@types/*", "*eslint*", "*prettier*", "@biomejs/*"]
        exclude-patterns: ["@types/react", "@types/react-dom"]
    # Only minor and patch updates
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]